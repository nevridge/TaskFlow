services:
  taskflow-api:
    image: taskflow-api:prod
    build:
      context: .
      dockerfile: TaskFlow.Api/Dockerfile
    container_name: taskflow-api-prod
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      # Production now applies database migrations automatically on startup.
      # Do not follow older manual-migration guidance that used
      # Database__MigrateOnStartup=false for this compose deployment.
      - Database__MigrateOnStartup=true
    volumes:
      - taskflow-data-prod:/app/data
      - taskflow-logs-prod:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  taskflow-data-prod:
    driver: local
  taskflow-logs-prod:
    driver: local
